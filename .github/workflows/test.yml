name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install libsystemd-dev podman bats
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.0'

    - name: Vendor
      run: go mod vendor

    - name: Test
      run: go test -mod=vendor -v ./...

    - name: Run BATS tests
      shell: bash
      run: |
        echo "### BATS Test Results" >> $GITHUB_STEP_SUMMARY
        echo "| File | Test Case | Status |" >> $GITHUB_STEP_SUMMARY
        echo "| :--- | :--- | :---: |" >> $GITHUB_STEP_SUMMARY

        EXIT_CODE=0
        for test_file in test/unit-test.bats test/integrated-tests.bats test/keycloak-tests.bats; do
          if [ ! -f "$test_file" ]; then
            echo "::warning::Test file $test_file not found"
            continue
          fi

          echo "::group::Running $test_file"
          # Run bats and capture TAP output
          # We use a temp file to avoid issues with large outputs in variables
          # and to make parsing easier.
          if ! bats --formatter tap "$test_file" | tee test_output.tap; then
            EXIT_CODE=1
            echo "::error::$test_file failed - rerunning with verbose output"
            echo ""
            echo "=== VERBOSE OUTPUT FOR FAILED TEST ==="
            bats --verbose-run --show-output-of-passing-tests "$test_file" || true
            echo "=== END VERBOSE OUTPUT ==="
            echo ""
          fi

          while read -r line; do
            if [[ $line =~ ^ok\ [0-9]+\ (.*) ]]; then
              test_name="${BASH_REMATCH[1]}"
              # Escape pipes in test names for Markdown table
              echo "| $test_file | ${test_name//|/\\|} | ✅ |" >> $GITHUB_STEP_SUMMARY
            elif [[ $line =~ ^not\ ok\ [0-9]+\ (.*) ]]; then
              test_name="${BASH_REMATCH[1]}"
              echo "| $test_file | ${test_name//|/\\|} | ❌ |" >> $GITHUB_STEP_SUMMARY
            fi
          done < test_output.tap
          rm test_output.tap
          echo "::endgroup::"
        done

        exit $EXIT_CODE
